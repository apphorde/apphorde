<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace - App Builder</title>
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="component" href="https://sodium.static.apphor.de/lucide-icon.html" />
    <link rel="component" href="/components/ws-applet.html" />
    <link rel="component" href="/components/ws-canvas.html" />
    <link rel="component" href="/components/ws-toolbar.html" />
    <script type="importmap">
      {
        "imports": {
          "@li3/": "https://at-li3.static.apphor.de/",
          "@sodium/": "https://sodium.static.apphor.de/",
          "@app/": "./" 
        }
      }
    </script>
    <script type="module">
      import "@li3/web";
    </script>
  </head>

  <body>
    <template app>
      <script setup src="/app.mjs"></script>
      <div class="h-screen w-screen overflow-hidden bg-gray-900 select-none">
        <ws-toolbar></ws-toolbar>

        <!-- Instructions -->
        <div
          class="absolute top-4 right-4 z-50 rounded-lg bg-gray-800 shadow-lg bg-white"
        >
          <button
            on-click="toggleInstructions()"
            class="flex items-center gap-2 p-3 text-gray-400 hover:text-white transition-colors w-full"
            title="Show instructions"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="transition: transform 0.2s"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <path d="M12 17h.01"></path>
            </svg>
            <span class="text-sm font-medium">Help</span>
          </button>
          <div
            class="px-3 pb-3 text-xs text-gray-400 max-w-xs"
            class-hidden="instructionsCollapsed"
          >
            <ul class="space-y-0.5">
              <li>Click & drag to draw an applet area</li>
              <li>Ctrl/Cmd + drag to pan</li>
              <li>Scroll to zoom</li>
              <li>Min size: 100x100px</li>
              <li>Drag title bar to move applets</li>
              <li>Drag edges/corners to resize</li>
            </ul>
          </div>
        </div>

        <ws-canvas></ws-canvas>

        <div ref="appletsContainer" style="z-index: 2">
          <template for="applet of applets">
            <ws-applet
              bind-id="applet.id"
              bind-applet="applet"
              bind-active="draggingApplet === applet.id || resizingApplet === applet.id"
              on-resize="onResizeStart(applet, $event.detail)"
              on-drag="onDragStart(applet, $event.detail)"
              on-select="onSelect(applet, $event.detail)"
              on-delete="onDelete(applet)"
            ></ws-applet>
          </template>
        </div>
      </div>
    </template>
  </body>
</html>
