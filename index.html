<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace - App Builder</title>
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="component" href="https://sodium.static.apphor.de/lucide-icon.html" />
    <link rel="component" href="/components/ws-applet.html" />
    <link rel="component" href="/components/ws-canvas.html" />
    <link rel="component" href="/components/ws-toolbar.html" />
    <script type="importmap">
      {
        "imports": {
          "@li3/": "https://at-li3.static.apphor.de/",
          "@sodium/": "https://sodium.static.apphor.de/",
          "@app/": "./" 
        }
      }
    </script>
    <script type="module">
      import "@li3/web";
    </script>
  </head>

  <body>
    <template app>
      <script setup src="/app.mjs"></script>
      <div class="h-screen w-screen overflow-hidden bg-gray-900 select-none">
        <ws-toolbar></ws-toolbar>

        <ws-canvas on-down="onDown()" on-move="onMove($event)" on-draw="onDraw($event)"></ws-canvas>

        <div ref="appletsContainer" style="z-index: 2">
          <template for="applet of applets">
            <ws-applet
              bind-id="applet.id"
              bind-applet="applet"
              bind-active="draggingApplet === applet.id || resizingApplet === applet.id"
              on-resizestart="onResizeStart(applet, $event.detail)"
              on-resizestop="onResizeStop()"
              on-dragstart="onDragStart(applet, $event.detail)"
              on-dragstop="onDragStop()"
              on-select="onSelect(applet, $event.detail)"
              on-delete="onDelete(applet)"
              style-zIndex="`${applet.zIndex || 1}`"
              bind-style="{
                left: `${applet.x}px`,
                top: `${applet.y}px`,
                width: `${applet.width}px`,
                height: `${applet.height}px`,
                zIndex: `${applet.zIndex || 1}`
              }"
              class="absolute"
              class-ring-2.ring-blue-500="draggingApplet === applet.id || resizingApplet === applet.id"
            ></ws-applet>
          </template>
        </div>
      </div>
    </template>
  </body>
</html>
