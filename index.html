<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace - App Builder</title>
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="component" href="/ws-applet.html" />
    <script type="importmap">
      {
        "imports": {
          "@li3/": "https://at-li3.static.apphor.de/"
        }
      }
    </script>
    <script type="module">
      import "@li3/web";
    </script>
  </head>

  <body>
    <template app>
      <script setup src="/index.mjs"></script>
      <div class="h-screen w-screen overflow-hidden bg-zinc-900 select-none">
        <!-- Toolbar -->
        <div
          class="absolute top-4 left-4 z-50 flex items-center gap-2 rounded-lg bg-zinc-800 p-2 shadow-lg"
        >
          <button
            class="text-zinc-400 hover:text-white transition-colors px-1"
            bind-title="toolbarCollapsed ? 'Expand toolbar' : 'Collapse toolbar' "
            on-click="toggleToolbar()"
          >
            {{ toolbarCollapsed ? "▶" : "◀"; }}
          </button>
          <div
            class="items-center gap-2"
            class-flex="!toolbarCollapsed"
            class-none="toolbarCollapsed"
          >
            <span class="px-2 text-sm text-zinc-400">{{ zoomText }}</span>
            <button
              on-click="resetView()"
              class="rounded bg-zinc-700 px-3 py-1.5 text-sm text-white hover:bg-zinc-600 transition-colors"
            >
              Reset View
            </button>
            <button
              on-click="showAllApplets()"
              bind-disabled="!applets.length"
              class="rounded bg-blue-600 px-3 py-1.5 text-sm text-white hover:bg-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Show All
            </button>
            <button
              on-click="tileApplets()"
              bind-disabled="!applets.length"
              class="rounded bg-emerald-600 px-3 py-1.5 text-sm text-white hover:bg-emerald-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Tile
            </button>
            <button
              on-click="clearAll()"
              class="rounded bg-red-600 px-3 py-1.5 text-sm text-white hover:bg-red-500 transition-colors"
            >
              Clear All
            </button>
          </div>
        </div>

        <!-- Instructions -->
        <div
          class="absolute top-4 right-4 z-50 rounded-lg bg-zinc-800 shadow-lg"
        >
          <button
            on-click="toggleInstructions()"
            class="flex items-center gap-2 p-3 text-zinc-400 hover:text-white transition-colors w-full"
            title="Show instructions"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="transition: transform 0.2s"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <path d="M12 17h.01"></path>
            </svg>
            <span class="text-sm font-medium">Help</span>
          </button>
          <div
            class="px-3 pb-3 text-xs text-zinc-400 max-w-xs"
            class-none="instructionsCollapsed"
          >
            <ul class="space-y-0.5">
              <li>Click & drag to draw an applet area</li>
              <li>Ctrl/Cmd + drag to pan</li>
              <li>Scroll to zoom</li>
              <li>Min size: 100x100px</li>
              <li>Drag title bar to move applets</li>
              <li>Drag edges/corners to resize</li>
            </ul>
          </div>
        </div>

        <!-- Canvas -->
        <div
          ref="canvas"
          class="h-full w-full cursor-crosshair"
          style-background-size="`${zoomSize}px ${zoomSize}px`"
          ;
          style-background-position="`${panX}px ${panY}px`"
          ;
          style="
            background-image: radial-gradient(
              circle,
              #3f3f46 1px,
              transparent 1px
            );
            background-size: 20px 20px;
            background-position: 0px 0px;
          "
          on-mousedown=" handleMouseDown($event)"
          on-mousemove=" handleMouseMove($event)"
          on-mouseup=" handleMouseUp($event)"
          on-mouseleave=" handleMouseUp($event)"
          on-wheel.passive="handleWheel($event)"
        >
          <!-- Transform container -->
          <div
            style="transform-origin: 0 0"
            style-transform="`translate(${panX}px, ${panY}px) scale(${zoom})`"
          >
            <!-- Drawing preview -->
            <div
              ref="drawPreview"
              class="absolute border-2 border-dashed border-blue-500 bg-blue-500/20 rounded-lg pointer-events-none"
              class-none="!isDrawing"
              style-left="`${drawPreviewCoords.x}px`"
              style-top="`${drawPreviewCoords.y}px`"
              style-width="`${drawPreviewCoords.width}px`"
              style-height="`${drawPreviewCoords.height}px`"
            >
              <span
                class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-blue-300 text-sm whitespace-nowrap"
                >{{ Math.round(drawPreviewCoords.width) }} x
                {{Math.round(drawPreviewCoords.height)}}</span
              >
            </div>

            <!-- Applets container -->
            <div ref="appletsContainer">
              <template for="applet of applets">
                <ws-applet
                  bind-id="applet.id"
                  bind-active="draggingApplet === applet.id || resizingApplet === applet.id"
                  on-resize="onResizeStart(applet, $event)"
                  on-drag="onDragStart(applet, $event)"
                  on-select="onSelect(applet, app)"
                  on-delete="onDeleteApplet(applet)"
                ></ws-applet>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>
  </body>
</html>
