<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0" />
  <title>AppHorde</title>
  <link rel="stylesheet"
    href="https://wdn.apphor.de/apphorde/site.css" />
  <script type="importmap">
      {
        "imports": {
          "@li3/": "https://cdn.li3.dev/@li3/"
        }
      }
    </script>
  <script type="module">import '@li3/web';</script>
</head>

<body class="app">
  <main class="main">
    <section class="container px-4 py-12 md:py-16">
      <a href="https://apphor.de"
        class="flex flex-col items-center text-center mb-12 md:mb-16">
        <img src="/assets/icon.svg"
          width="128"
          height="128"
          alt="AppHorde"
          class="w-40 h-40 img-square" />
        <h1 class="text-3xl font-bold sm:text-4xl md:text-5xl">App Horde</h1>
        <p class="mt-4">Web apps built for the modern web.</p>
      </a>
      <template app>
        <script setup>
          export default function () {
            const apps = [
              {
                name: 'Crontab Generator',
                slug: 'crontab-generator',
                icon: '/icon.svg',
                description: 'Generate crontab expressions with a little help from AI',
              },
              {
                name: 'Transcriber',
                slug: 'transcriber',
                icon: '/icon.svg',
                description: 'Convert voice to text.',
              },
              {
                name: 'Imaginator',
                slug: 'imaginator',
                icon: '/icon.svg',
                description: 'Transform your words into stunning visuals with an AI-powered image generator.',
              },
              {
                name: 'Tuya Control',
                slug: 'tuya-control',
                icon: '/assets/icon.svg',
                description: 'A room controller for Tuya-powered devices.',
              },
              {
                name: 'Quizzer',
                slug: 'quizzer',
                icon: '/assets/icon.svg',
                description: 'A flashcards game with an API for deck creation.',
              },
              {
                name: 'Pomodoro',
                slug: 'pomodoro',
                icon: '/assets/icon.svg',
                description: 'Focus on your tasks with this simple timer.',
              },
              {
                name: 'Todo',
                slug: 'todo',
                icon: '/assets/icon.svg',
                description: 'Yet another todo list.',
              },
              {
                name: 'Narrator',
                slug: 'narrator',
                icon: '/narrator.svg',
                description: 'Text to voice app.',
              },
            ];

            const getUrl = (app) => new URL(`https://${app.slug}.apphor.de`);
            const getIcon = (app) => new URL(app.icon, `https://${app.slug}.apphor.de`);

            return { apps, getUrl, getIcon };
          }
        </script>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 lg:gap-8">
          <template for="app of apps">
            <a bind-href="getUrl(app)"
              class="card">
              <img bind-src="getIcon(app)"
                bind-alt="app.name"
                class="card__icon object-cover img-square" />
              <div class="card__text">
                <h3 class="card__title">{{ app.name }}</h3>
                <p class="card_desc">{{ app.description || '' }}</p>
              </div>
            </a>
          </template>
        </div>
      </template>
    </section>
  </main>
  <footer class="footer">
    Made by <a href="https://darlanalv.es">Darlan Alves</a>.
    <a href="https://github.com/apphorde">See more on GitHub</a>
  </footer>
</body>

</html>
